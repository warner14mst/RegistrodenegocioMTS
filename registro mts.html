<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario General Contable - Futurista</title>
    <style>
        /* Estilos Base y Fondo Futurista */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #0a192f;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(28, 110, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(100, 255, 218, 0.1) 0%, transparent 40%),
                url("https://i.pinimg.com/736x/0b/65/d7/0b65d73c6080a52a08a55d23337e3370.jpg");
            background-attachment: fixed;
            background-size: cover;
            color: #e6f1ff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container, .input-group, table {
            backdrop-filter: blur(10px);
            background: rgba(16, 32, 64, 0.75);
            border: 1px solid rgba(100, 255, 218, 0.2);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
            padding: 20px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        h1, h2 { text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        h1 { color: #64ffda; font-size: 1.5rem; margin-bottom: 20px; transition: 0.3s; }
        h1:hover { color: #1c6eff; text-shadow: 0 0 15px #1c6eff; }
        h2 { color: #1c6eff; border-bottom: 2px solid #1c6eff; display: inline-block; padding-bottom: 5px; }

        .div { background: transparent !important; box-shadow: none !important; width: 100% !important; display: flex; flex-direction: column; gap: 10px; }
        label { display: flex; flex-direction: column; margin: 10px 0; font-size: 0.9rem; color: #8892b0; background: transparent !important; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #233554; background: #112240; color: #ccd6f6; font-size: 1rem; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #64ffda; box-shadow: 0 0 8px rgba(100, 255, 218, 0.3); }

        button, input[type="button"] { background: transparent; border: 1px solid #64ffda; color: #64ffda; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 15px; }
        button:hover, input[type="button"]:hover { background: rgba(100, 255, 218, 0.1); box-shadow: 0 0 15px rgba(100, 255, 218, 0.4); transform: translateY(-2px); }

        .table-wrapper { width: 100%; overflow-x: auto; }
        table { border-collapse: collapse; }
        th { background-color: #1c6eff; color: white; padding: 15px; text-transform: uppercase; font-size: 0.85rem; }
        td { border: 1px solid #233554; padding: 12px; font-size: 0.9rem; }
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.03); }
        tfoot td { background: #112240; font-weight: bold; color: #64ffda; }

        @media (max-width: 768px) { body { padding: 10px; } input, select, button { width: 100%; } h1 { font-size: 1.2rem; } }
    </style>
</head>
<body>
   
    <div class="container">
        <div class="div"> 
            <h1>Datos personales del contador</h1>
            <input type="text" id="rnc" placeholder="RNC">
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="button" value="Registrar Datos" onclick="registrarDatos()">
        </div>
    </div>

    <h2>Diario General</h2>
    
    <div class="input-group">
        <label>Fecha: <input type="date" id="fecha"></label>
        <label>Descripción: <input type="text" id="descripcion" placeholder="Ej. Pago de servicios"></label>
        <label>Aux: <input type="text" id="aux" placeholder="Referencia"></label>
        <label>Monto: <input type="number" id="monto" placeholder="0.00"></label>
        <label>Tipo:
            <select id="tipo">
                <option value="debito">Débito</option>
                <option value="credito">Crédito</option>
            </select>
        </label>
        <button onclick="agregarRegistro()">Agregar a Diario</button>
    </div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Descripción</th>
                    <th>Aux</th>
                    <th>Débito</th>
                    <th>Crédito</th>
                    <th>Registrado por</th>
                    <th>RNC</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-registros"></tbody>
            <tfoot>
                <tr>
                    <td colspan="3"><strong>TOTALES ACUMULADOS</strong></td>
                    <td id="total-debito">0</td>
                    <td id="total-credito">0</td>
                    <td colspan="3"></td>
                </tr>
            </tfoot>
        </table>
    </div>

    <button style="margin-bottom: 50px; border-color: #1c6eff; color: #1c6eff;" onclick="calcularTotales()">Calcular Totales Finales</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvrSjcCEjC85zRdoa70qxbl6mB5mZCqfM",
            authDomain: "diario-741c0.firebaseapp.com",
            databaseURL: "https://diario-741c0-default-rtdb.firebaseio.com",
            projectId: "diario-741c0",
            storageBucket: "diario-741c0.firebasestorage.app",
            messagingSenderId: "467452461317",
            appId: "1:467452461317:web:b24d63f2621babfeb9376c",
            measurementId: "G-8F4G4GM7X2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Hacer funciones accesibles globalmente
        window.registrarDatos = function() {
            let nombreInput = document.getElementById("nombre").value;
            let rncInput = document.getElementById("rnc").value;
            if (nombreInput.trim() === "" || rncInput.trim() === "") {
                alert("Por favor, ingrese su nombre y RNC.");
                return;
            }
            localStorage.setItem('nombreRegistrado', nombreInput);
            localStorage.setItem('rncRegistrado', rncInput);
            alert("Datos de sesión registrados localmente.");
        };

        window.agregarRegistro = function() {
            const nombre = localStorage.getItem('nombreRegistrado');
            const rnc = localStorage.getItem('rncRegistrado');

            if (!nombre || !rnc) {
                alert("Debe registrar su nombre y RNC antes de agregar operaciones.");
                return;
            }

            const registro = {
                fecha: document.getElementById("fecha").value,
                descripcion: document.getElementById("descripcion").value,
                aux: document.getElementById("aux").value,
                monto: document.getElementById("monto").value,
                tipo: document.getElementById("tipo").value,
                registradoPor: nombre,
                rnc: rnc
            };

            if (!registro.fecha || !registro.descripcion || !registro.monto) {
                alert("Complete los campos obligatorios");
                return;
            }

            const dbRef = ref(db, 'registros');
            push(dbRef, registro);
        };

        window.eliminarRegistro = function(id) {
            remove(ref(db, `registros/${id}`));
        };

        // Escuchar cambios en tiempo real desde Firebase
        const registrosRef = ref(db, 'registros');
        onValue(registrosRef, (snapshot) => {
            const data = snapshot.val();
            const tabla = document.getElementById("tabla-registros");
            tabla.innerHTML = "";
            
            if (data) {
                Object.keys(data).forEach(id => {
                    const reg = data[id];
                    const fila = document.createElement("tr");
                    fila.innerHTML = `
                        <td>${reg.fecha}</td>
                        <td>${reg.descripcion}</td>
                        <td>${reg.aux}</td>
                        <td>${reg.tipo === 'debito' ? reg.monto : ''}</td>
                        <td>${reg.tipo === 'credito' ? reg.monto : ''}</td>
                        <td>${reg.registradoPor}</td>
                        <td>${reg.rnc}</td>
                        <td><button style="color:#ff4d4d; border-color:#ff4d4d" onclick="eliminarRegistro('${id}')">Eliminar</button></td>
                    `;
                    tabla.appendChild(fila);
                });
            }
            window.calcularTotales();
        });

        window.calcularTotales = function() {
            let totalDebito = 0;
            let totalCredito = 0;
            let filas = document.querySelectorAll("#tabla-registros tr");
            filas.forEach(fila => {
                let debito = fila.cells[3].innerText;
                let credito = fila.cells[4].innerText;
                totalDebito += debito ? parseFloat(debito) || 0 : 0;
                totalCredito += credito ? parseFloat(credito) || 0 : 0;
            });
            document.getElementById("total-debito").innerText = totalDebito.toLocaleString();
            document.getElementById("total-credito").innerText = totalCredito.toLocaleString();
        };
    </script>
</body>
</html>
