<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Inteligente de Tareas</title>
    <style>
        /* ================= CSS ================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2b7a78;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        /* Estilo para que resalte el input de días */
        #diasInput { 
            width: 120px; 
            border: 2px solid #3aafa9; 
            font-weight: bold; 
        }

        .btn-add {
            padding: 10px 20px;
            background-color: #3aafa9;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #def2f1;
            color: #17252a;
        }

        .btn-estado, .btn-borrar {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-estado { background-color: #f39c12; color: white; }
        .btn-estado.completada { background-color: #27ae60; }
        .btn-borrar { background-color: #e74c3c; color: white; }

    </style>
</head>
<body>

    <h1>Calendario de Clases Pendientes</h1>

    <form class="form-container" id="formularioClases">
        <input type="text" id="nombrePersona" placeholder="Tu Nombre" required>
        <input type="text" id="materia" placeholder="Materia" required>
        <input type="text" id="nombreTarea" placeholder="Tarea" required>
        <input type="text" id="unidad" placeholder="Unidad" required>
        <input type="number" id="diasInput" placeholder="¿Días faltan?" min="0" required>
        <button type="submit" class="btn-add">Agregar Tarea</button>
    </form>

    <table id="tablaTareas">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Materia</th>
                <th>Tarea</th>
                <th>Unidad</th>
                <th>Tiempo Restante</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCvrSjcCEjC85zRdoa70qxbl6mB5mZCqfM",
            authDomain: "diario-741c0.firebaseapp.com",
            databaseURL: "https://diario-741c0-default-rtdb.firebaseio.com",
            projectId: "diario-741c0",
            storageBucket: "diario-741c0.firebasestorage.app",
            messagingSenderId: "467452461317",
            appId: "1:467452461317:web:b24d63f2621babfeb9376c",
            measurementId: "G-8F4G4GM7X2"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const tareasRef = ref(database, 'tareas');
        const cuerpoTabla = document.querySelector('#tablaTareas tbody');
        const alertasMostradas = new Set();

        // --- LÓGICA PARA AGREGAR ---
        document.getElementById('formularioClases').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const diasParaVencer = parseInt(document.getElementById('diasInput').value);
            const fechaMeta = new Date();
            // Sumamos los días a la fecha actual
            fechaMeta.setDate(fechaMeta.getDate() + diasParaVencer);
            fechaMeta.setHours(0, 0, 0, 0); // Limpiamos horas para cálculo exacto

            push(tareasRef, {
                nombrePersona: document.getElementById('nombrePersona').value,
                materia: document.getElementById('materia').value,
                nombreTarea: document.getElementById('nombreTarea').value,
                unidad: document.getElementById('unidad').value,
                timestampMeta: fechaMeta.getTime(), // Guardamos el momento del futuro
                estado: 'Pendiente'
            });

            e.target.reset();
        });

        // --- LÓGICA PARA LEER Y ACTUALIZAR DÍAS ---
        onValue(tareasRef, (snapshot) => {
            cuerpoTabla.innerHTML = '';
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            if (snapshot.exists()) {
                const datos = snapshot.val();
                Object.keys(datos).forEach((id) => {
                    const t = datos[id];
                    const fila = document.createElement('tr');
                    
                    // Calculamos cuántos días faltan realmente hoy
                    const fechaMeta = new Date(t.timestampMeta);
                    const diferenciaMili = fechaMeta - hoy;
                    const diasReales = Math.ceil(diferenciaMili / (1000 * 60 * 60 * 24));

                    let color = "";
                    let textoDias = diasReales > 0 ? `Faltan ${diasReales} días` : (diasReales === 0 ? "Vence hoy" : "Vencida");

                    // REGLA DE COLORES QUE PEDISTE
                    if (t.estado !== 'Completada') {
                        if (diasReales > 5) {
                            color = "#d0ebff"; // AZUL
                        } else if (diasReales > 1) {
                            color = "#d3f9d8"; // VERDE
                        } else {
                            color = "#ffc9c9"; // ROJO (1 día o menos)
                            
                            // ALERTA DE 1 DÍA
                            if (diasReales === 1 && !alertasMostradas.has(id)) {
                                alert(`¡NOTIFICACIÓN! A ${t.nombrePersona} le queda solo 1 día para la tarea: ${t.nombreTarea}`);
                                alertasMostradas.add(id);
                            }
                        }
                    }

                    fila.style.backgroundColor = color;
                    fila.innerHTML = `
                        <td>${t.nombrePersona}</td>
                        <td>${t.materia}</td>
                        <td>${t.nombreTarea}</td>
                        <td>${t.unidad}</td>
                        <td><strong>${textoDias}</strong></td>
                        <td><button class="btn-estado ${t.estado === 'Completada' ? 'completada' : ''}">${t.estado}</button></td>
                        <td><button class="btn-borrar">Borrar</button></td>
                    `;

                    // Funcionalidad botones
                    fila.querySelector('.btn-estado').onclick = () => {
                        const nuevoEstado = t.estado === 'Pendiente' ? 'Completada' : 'Pendiente';
                        update(ref(database, 'tareas/' + id), { estado: nuevoEstado });
                    };

                    fila.querySelector('.btn-borrar').onclick = () => {
                        if(confirm('¿Borrar esta tarea?')) remove(ref(database, 'tareas/' + id));
                    };

                    cuerpoTabla.appendChild(fila);
                });
            }
        });
    </script>
</body>
</html>
