<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de clases pendientes</title>
    <style>
        /* ================= CSS (Estilos) ================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #2b7a78;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .btn-add {
            padding: 10px 20px;
            background-color: #3aafa9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            max-width: 950px;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #def2f1;
            color: #17252a;
        }

        .btn-estado, .btn-borrar {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-estado { background-color: #f39c12; color: white; }
        .btn-estado.completada { background-color: #27ae60; }
        .btn-borrar { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>Calendario de Clases Pendientes</h1>

    <form class="form-container" id="formularioClases">
        <input type="text" id="nombrePersona" placeholder="Nombre" required>
        <input type="text" id="materia" placeholder="Materia" required>
        <input type="text" id="nombre" placeholder="Tarea" required>
        <input type="text" id="unidad" placeholder="Unidad" required>
        <input type="date" id="fechaSeleccionada" required>
        <button type="submit" class="btn-add">Agregar</button>
    </form>

    <table id="tablaTareas">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Materia</th>
                <th>Tarea</th>
                <th>Unidad</th>
                <th>Tiempo Restante</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCvrSjcCEjC85zRdoa70qxbl6mB5mZCqfM",
            authDomain: "diario-741c0.firebaseapp.com",
            databaseURL: "https://diario-741c0-default-rtdb.firebaseio.com",
            projectId: "diario-741c0",
            storageBucket: "diario-741c0.firebasestorage.app",
            messagingSenderId: "467452461317",
            appId: "1:467452461317:web:b24d63f2621babfeb9376c",
            measurementId: "G-8F4G4GM7X2"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const tareasRef = ref(database, 'tareas');
        const cuerpoTabla = document.querySelector('#tablaTareas tbody');
        const alertasMostradas = new Set();

        // Agregar tarea calculando días
        document.getElementById('formularioClases').addEventListener('submit', (e) => {
            e.preventDefault();
            push(tareasRef, {
                nombrePersona: document.getElementById('nombrePersona').value,
                materia: document.getElementById('materia').value,
                nombre: document.getElementById('nombre').value,
                unidad: document.getElementById('unidad').value,
                fechaLimite: document.getElementById('fechaSeleccionada').value,
                estado: 'Pendiente'
            });
            e.target.reset();
        });

        onValue(tareasRef, (snapshot) => {
            cuerpoTabla.innerHTML = '';
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            if (snapshot.exists()) {
                const datos = snapshot.val();
                Object.keys(datos).forEach((id) => {
                    const t = datos[id];
                    const fila = document.createElement('tr');
                    
                    // Cálculo de días restantes
                    const fechaVenc = new Date(t.fechaLimite + "T00:00:00");
                    const diff = fechaVenc - hoy;
                    const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));

                    let textoDias = dias > 0 ? `Faltan ${dias} días` : (dias === 0 ? "Vence hoy" : "Vencida");
                    let color = "";

                    if (t.estado !== 'Completada') {
                        if (dias > 5) {
                            color = "#d0ebff"; // Azul
                        } else if (dias > 1) {
                            color = "#d3f9d8"; // Verde
                        } else {
                            color = "#ffc9c9"; // Rojo (1 día o menos)
                            if (dias === 1 && !alertasMostradas.has(id)) {
                                alert(`¡Atención! Falta 1 día para: ${t.nombre}`);
                                alertasMostradas.add(id);
                            }
                        }
                    }

                    fila.style.backgroundColor = color;
                    fila.innerHTML = `
                        <td>${t.nombrePersona}</td>
                        <td>${t.materia}</td>
                        <td>${t.nombre}</td>
                        <td>${t.unidad}</td>
                        <td><strong>${textoDias}</strong></td>
                        <td><button class="btn-estado ${t.estado === 'Completada' ? 'completada' : ''}">${t.estado}</button></td>
                        <td><button class="btn-borrar">Borrar</button></td>
                    `;

                    fila.querySelector('.btn-estado').onclick = () => {
                        const nuevo = t.estado === 'Pendiente' ? 'Completada' : 'Pendiente';
                        update(ref(database, 'tareas/' + id), { estado: nuevo });
                    };

                    fila.querySelector('.btn-borrar').onclick = () => {
                        if(confirm('¿Borrar?')) remove(ref(database, 'tareas/' + id));
                    };

                    cuerpoTabla.appendChild(fila);
                });
            }
        });
    </script>
</body>
</html>
