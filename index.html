<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Ganancias MS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        .card-sold { border-left: 8px solid #10b981; background-color: #f0fdf4; }
        .card-available { border-left: 8px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-2xl">
        <div class="max-w-6xl mx-auto p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-black italic text-blue-400">STORE MST <span class="text-white">PRO</span></h1>
                <span class="bg-blue-600 px-3 py-1 rounded-full text-xs font-bold">Panel Financiero</span>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-[10px] uppercase text-gray-400">Inversión Total</p>
                    <p id="total-cost" class="text-lg font-bold text-white">RD$ 0</p>
                </div>
                <div class="bg-slate-800 p-3 rounded-2xl">
                    <p class="text-[10px] uppercase text-gray-400">Artículos</p>
                    <p id="total-items" class="text-lg font-bold text-white">0</p>
                </div>
                <div class="bg-blue-900/50 p-3 rounded-2xl border border-blue-500/30">
                    <p class="text-[10px] uppercase text-blue-300">Ganancia Potencial</p>
                    <p id="total-potential" class="text-lg font-bold text-blue-300">RD$ 0</p>
                </div>
                <div class="bg-green-900/50 p-3 rounded-2xl border border-green-500/30">
                    <p class="text-[10px] uppercase text-green-400">Ganancia Real (Caja)</p>
                    <p id="total-profit" class="text-xl font-black text-green-400">RD$ 0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        
        <section class="bg-white rounded-3xl shadow-sm border border-gray-200 p-6 mb-8">
            <form id="productForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-2">
                    <label class="text-xs font-bold text-gray-500 ml-1">NOMBRE DEL PRODUCTO</label>
                    <input type="text" id="pName" placeholder="Ej: Laptop Dell" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">COSTO (LO QUE PAGASTE)</label>
                    <input type="number" id="pCost" placeholder="0.00" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">PRECIO VENTA (A CLIENTE)</label>
                    <input type="number" id="pPrice" placeholder="0.00" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                
                <div class="md:col-span-4 flex flex-col md:flex-row gap-4 mt-2">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-200 uppercase tracking-widest">
                        Registrar Producto
                    </button>
                    
                    <a href="registro mts.html" class="flex-1 bg-slate-800 hover:bg-slate-700 text-blue-400 font-black py-4 rounded-2xl transition-all shadow-lg border border-slate-700 uppercase tracking-widest text-center flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5s3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        Diario General
                    </a>



                      
                    <a href="tarea.html" class="flex-1 bg-slate-800 hover:bg-slate-700 text-red-400 font-black py-4 rounded-2xl transition-all shadow-lg border border-slate-700 uppercase tracking-widest text-center flex items-center justify-center gap-2">
                    
                   clases pendientes
                    </a>
                </div>
            </form>
        </section>

        <div class="overflow-hidden bg-white rounded-3xl border border-gray-200 shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-bold">
                    <tr>
                        <th class="p-4">Producto</th>
                        <th class="p-4">Costo</th>
                        <th class="p-4">Venta</th>
                        <th class="p-4">Ganancia</th>
                        <th class="p-4 text-center">Acción</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable" class="text-sm">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN ACTUALIZADA DE TU BASE DE DATOS
        const firebaseConfig = {
            apiKey: "AIzaSyCvrSjcCEjC85zRdoa70qxbl6mB5mZCqfM",
            authDomain: "diario-741c0.firebaseapp.com",
            databaseURL: "https://diario-741c0-default-rtdb.firebaseio.com",
            projectId: "diario-741c0",
            storageBucket: "diario-741c0.firebasestorage.app",
            messagingSenderId: "467452461317",
            appId: "1:467452461317:web:b24d63f2621babfeb9376c",
            measurementId: "G-8F4G4GM7X2"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const productsRef = db.ref('control_ganancias');

        const form = document.getElementById('productForm');
        const tableBody = document.getElementById('inventoryTable');

        form.onsubmit = (e) => {
            e.preventDefault();
            const cost = parseFloat(document.getElementById('pCost').value);
            const price = parseFloat(document.getElementById('pPrice').value);
            
            productsRef.push({
                name: document.getElementById('pName').value,
                cost: cost,
                price: price,
                profit: price - cost,
                status: 'disponible'
            });
            form.reset();
        };

        productsRef.on('value', (snapshot) => {
            tableBody.innerHTML = '';
            let inv_total_cost = 0;
            let inv_total_items = 0;
            let inv_potential_profit = 0;
            let inv_real_profit = 0;

            const data = snapshot.val();
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const p = data[key];
                    const isSold = p.status === 'vendido';
                    
                    inv_total_items++;
                    inv_total_cost += p.cost;
                    inv_potential_profit += p.profit;
                    if(isSold) inv_real_profit += p.profit;

                    tableBody.innerHTML += `
                        <tr class="border-t border-gray-100 ${isSold ? 'card-sold bg-green-50/30' : 'card-available'}">
                            <td class="p-4">
                                <p class="font-bold text-gray-800">${p.name}</p>
                                <span class="text-[9px] ${isSold ? 'text-green-600 font-bold' : 'text-blue-500'} uppercase">
                                    ${isSold ? '● Vendido' : '○ En Inventario'}
                                </span>
                            </td>
                            <td class="p-4 text-gray-500 font-mono">RD$ ${p.cost.toLocaleString()}</td>
                            <td class="p-4 text-gray-800 font-bold font-mono">RD$ ${p.price.toLocaleString()}</td>
                            <td class="p-4 text-green-600 font-black font-mono">RD$ ${p.profit.toLocaleString()}</td>
                            <td class="p-4">
                                <div class="flex justify-center gap-2">
                                    <button onclick="toggleSold('${key}', '${p.status}')" class="px-3 py-1 rounded-lg text-xs font-bold ${isSold ? 'bg-gray-200 text-gray-600' : 'bg-green-500 text-white hover:bg-green-600'} transition-colors">
                                        ${isSold ? 'Reabrir' : 'Vendido'}
                                    </button>
                                    <button onclick="deleteP('${key}')" class="text-red-300 hover:text-red-500 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }

            document.getElementById('total-cost').innerText = `RD$ ${inv_total_cost.toLocaleString()}`;
            document.getElementById('total-items').innerText = inv_total_items;
            document.getElementById('total-potential').innerText = `RD$ ${inv_potential_profit.toLocaleString()}`;
            document.getElementById('total-profit').innerText = `RD$ ${inv_real_profit.toLocaleString()}`;
        });

        window.toggleSold = (key, current) => {
            db.ref('control_ganancias/' + key).update({
                status: current === 'disponible' ? 'vendido' : 'disponible'
            });
        };

        window.deleteP = (key) => {
            if(confirm("¿Eliminar este producto?")) db.ref('control_ganancias/' + key).remove();
        };
    </script>
</body>

</html>
